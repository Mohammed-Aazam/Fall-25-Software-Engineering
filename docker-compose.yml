version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=moj.py
      - FLASK_DEBUG=1
      - SECRET_KEY=docker-secret-key
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # AI service URL for internal container-to-container calls
      - AI_SERVICE_URL=http://ai-service:5002
    depends_on:
      db:
        condition: service_healthy # <-- WAIT until db is actually ready!

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Add this Healthcheck:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai_service  # Build from the local folder `ai_service`
    ports:
      - "5002:5002"

volumes:
  postgres_data:
